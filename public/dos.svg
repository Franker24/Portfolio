<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradiente neon -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF"></stop>
      <stop offset="100%" stop-color="#0066FF"></stop>
    </linearGradient>

    <!-- Fondo oscuro -->
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0f0f"></stop>
      <stop offset="100%" stop-color="#000000"></stop>
    </radialGradient>

    <!-- Glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo círculo -->
  <circle cx="256" cy="256" r="220" fill="url(#darkBg)"></circle>

  <!-- Borde neon -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#neonBlue)" stroke-width="8" filter="url(#glow)"></circle>

  <!-- FK principal -->
  <text x="256" y="250" text-anchor="middle" font-family="Montserrat, Arial Black, sans-serif" font-size="120" letter-spacing="8" fill="#000" stroke="url(#neonBlue)" stroke-width="4" filter="url(#glow)">
    FK
  </text>

  <!-- DEV más moderno -->
  <text x="256" y="330" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="42" letter-spacing="10" fill="url(#neonBlue)" opacity="0.9">
    DEV
  </text>

</svg>